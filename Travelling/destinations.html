<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destinations | TravelGo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f0f2f5; }
        .navbar { background: #2c3e50; padding: 20px; text-align: center; color: white; font-size: 24px; }
        .logo span { color: #ff7675; }
        
        .main-container { padding: 50px 5%; text-align: center; }
        .thrill-grid { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 30px; 
            justify-content: center; 
            margin-top: 30px; 
        }

        .thrill-card { 
            background: white; 
            width: 320px; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            text-decoration: none;
            color: #333;
            transition: 0.4s;
            border: 2px solid #fff;
        }
        .thrill-card:hover { transform: translateY(-15px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        /* IMAGE STYLE - ULTRA PRO MAX */
        .img-box { width: 100%; height: 230px; overflow: hidden; background: #eee; }
        .img-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Ye image ko container mein set rakhta hai */
            display: block;
        }

        .info { padding: 20px; text-align: left; }
        .info h3 { margin-bottom: 8px; color: #2c3e50; font-size: 22px; }
        .info p { color: #7f8c8d; font-size: 14px; }

        .book-btn { 
            display: inline-block; 
            margin-top: 50px; 
            padding: 18px 50px; 
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3);
        }
    </style>
</head>
<body>

    <nav class="navbar"><div class="logo">Travel<span>Go</span></div></nav>

    <div class="main-container">
        <h1>Apni <span style="color: #ff7675;">Dream Destination</span> Chunein</h1>
        
        <div class="thrill-grid">
            <a href="udaipur_list.html" class="thrill-card">
                <div class="img-box">
                    <img src="https://picsum.photos/id/1015/600/400" alt="Udaipur">
                </div>
                <div class="info">
                    <h3>Udaipur</h3>
                    <p>Experience the City of Lakes & Royal Life.</p>
                </div>
            </a>

            <a href="rishikesh_list.html" class="thrill-card">
                <div class="img-box">
                    <img src="https://picsum.photos/id/1018/600/400" alt="Rishikesh">
                </div>
                <div class="info">
                    <h3>Rishikesh</h3>
                    <p>The Land of Peace, Yoga and Adventure.</p>
                </div>
            </a>

            <a href="kashmir_list.html" class="thrill-card">
                <div class="img-box">
                    <img src="https://picsum.photos/id/1016/600/400" alt="Kashmir">
                </div>
                <div class="info">
                    <h3>Kashmir</h3>
                    <p>The Heaven on Earth with Snow Peaks.</p>
                </div>
            </a>
        </div>

        <a href="https://www.makemytrip.com/" target="_blank" class="book-btn">Book Your Trip Now ✈️</a>
    </div>

    <footer style="margin-top: 50px; padding: 20px; color: #7f8c8d;">
        © 2026 | TravelGo by Avni Chaudhary
    </footer>

</body>
</html>
