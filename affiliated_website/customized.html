<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customized Products | VIP Shop</title>
    <link rel="stylesheet" href="../style.css">
    <!-- Font Awesome for the WhatsApp Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        
        /* Header Match */
        .category-header { background: #232f3e; color: white; padding: 40px 20px; text-align: center; }
        
        /* Product Grid */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            padding: 40px 5%; 
        }

        .product-card { 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            transition: 0.3s; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            text-align: center;
        }

        .product-card:hover { transform: translateY(-5px); }

        .product-card img { 
            max-width: 100%; 
            height: 200px; 
            object-fit: contain; 
            margin-bottom: 15px; 
            border-radius: 5px;
        }

        .product-card h3 { font-size: 1.1rem; margin: 10px 0; color: #333; height: 3em; overflow: hidden; }
        
        .price { font-size: 1.3rem; font-weight: bold; color: #B12704; margin-bottom: 15px; }

        .buy-btn { 
            background: #25D366; 
            color: white; 
            text-decoration: none; 
            padding: 12px; 
            border-radius: 5px; 
            font-weight: bold; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .buy-btn:hover { background: #128C7E; }

        /* Navigation Styles (Same as your index) */
        header.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 5%; background: white; border-bottom: 1px solid #eee; }
        nav { display: flex; gap: 20px; }
        .nav-link { text-decoration: none; color: #333; font-weight: 500; }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="logo-container" style="display: flex; align-items: center; gap: 10px;">
        <img src="../logo.png" alt="Logo" style="height: 30px;">
        <span style="font-weight: bold;">Afflatus</span>
    </div>
    <nav>
        <a href="../index.html" class="nav-link">Home</a>
        <a href="index.html" class="nav-link">Shop Hub</a>
        <a href="../contact.html" class="nav-link">Contact</a>
    </nav>
</header>

<div class="category-header">
    <h1>Personalized & Customized Gifts</h1>
    <p>Hand-printed items delivered within 30km of Tonk</p>
</div>

<div id="product-container" class="product-grid">
    <!-- Products will be injected here by JavaScript -->
    <p>Loading customized deals...</p>
</div>

<script>
    async function loadCustomItems() {
        const container = document.getElementById('product-container');
        try {
            // Path to your root product.json
            const response = await fetch('../product.json');
            const data = await response.json();

            // Filter for ONLY customized products
            const customProducts = data.filter(item => item.category === "customized");

            if (customProducts.length === 0) {
                container.innerHTML = "<p>No products found in this category.</p>";
                return;
            }

            container.innerHTML = customProducts.map(item => `
                <div class="product-card">
                    <img src="${item.image}" alt="${item.title}">
                    <h3>${item.title}</h3>
                    <p class="price">₹${item.price}</p>
                    <a href="${item.link}" target="_blank" class="buy-btn">
                        <i class="fab fa-whatsapp"></i> Order on WhatsApp
                    </a>
                </div>
            `).join('');
        } catch (error) {
            console.error("Error loading products:", error);
            container.innerHTML = "<p>Error loading items. Please check product.json path.</p>";
        }
    }

    loadCustomItems();
</script>

</body>
</html>
