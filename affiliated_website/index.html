<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop Categories | VIP Gaming</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }
        .category-card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            background: #f9f9f9;
            transition: 0.3s;
            text-decoration: none;
            color: #333;
        }
        .category-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .category-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Browse by Category</h1>
    <div class="category-grid">
        <a href="gaming.html" class="category-card">
            <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=500" alt="Gaming">
            <h3>Gaming Gear</h3>
            <p>Mice, Keyboards, and Headsets</p>
        </a>

        <a href="electronics.html" class="category-card">
            <img src="https://images.unsplash.com/photo-1498049794561-7780e7231661?q=80&w=500" alt="Electronics">
            <h3>Electronics</h3>
            <p>Laptops, Monitors, and Accessories</p>
        </a>
    </div>
</body>
</html>
