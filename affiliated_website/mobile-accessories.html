<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Accessories | VIP Shop</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .category-header { background: #232f3e; color: white; padding: 40px 20px; text-align: center; }
        
        /* Search Bar Styling */
        .search-container { padding: 20px 5%; text-align: center; background: #fff; border-bottom: 1px solid #eee; }
        .search-input { 
            width: 100%; max-width: 500px; padding: 12px 20px; 
            border-radius: 30px; border: 2px solid #232f3e; 
            outline: none; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px 5%; }
        .product-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; text-align: center; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { max-width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px; border-radius: 5px; }
        .product-card h3 { font-size: 1.1rem; margin: 10px 0; color: #333; height: 3em; overflow: hidden; }
        .price { font-size: 1.3rem; font-weight: bold; color: #B12704; margin-bottom: 15px; }
        .buy-btn { background: #ff9900; color: white; text-decoration: none; padding: 12px; border-radius: 5px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .buy-btn:hover { background: #e68a00; }
        
        header.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 5%; background: white; border-bottom: 1px solid #eee; }
        nav { display: flex; gap: 20px; }
        .nav-link { text-decoration: none; color: #333; font-weight: 500; }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="logo-container" style="display: flex; align-items: center; gap: 10px;">
            <img src="../logo.png" alt="Logo" style="height: 30px;" onerror="this.src='https://via.placeholder.com/30'">
            <span style="font-weight: bold;">Afflatus</span>
        </div>
        <nav>
            <a href="../index.html" class="nav-link">Home</a>
            <a href="index.html" class="nav-link">Shop Hub</a>
            <a href="../contact.html" class="nav-link">Contact</a>
        </nav>
    </header>

    <div class="category-header">
        <h1>Mobile Accessories</h1>
        <p>Premium chargers, cases, and more for your devices</p>
    </div>

    <!-- Search Input Area -->
    <div class="search-container">
        <input type="text" id="productSearch" class="search-input" placeholder="Search accessories by name or ID (e.g. 100001)...">
    </div>

    <div id="product-container" class="product-grid">
        <p style="grid-column: 1/-1; text-align: center;">Loading accessories...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        // Specific CSV link for Mobile Accessories (gid=410903985)
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vROgG5rCiBGxWhLS-sen2CvY-OCXpDQ_12H3QGkYFBSaXD03LoQ65MJGTjrh2cR8INAGQbEDI4OaDI2/pub?gid=410903985&single=true&output=csv";
        
        let allAccessories = []; // Variable to store the full list

        function displayAccessories(products) {
            const container = document.getElementById('product-container');
            if (products.length === 0) {
                container.innerHTML = "<p style='grid-column: 1/-1; text-align: center; padding: 20px;'>No accessories found matching your search.</p>";
                return;
            }

            container.innerHTML = products.map(item => `
                <div class="product-card">
                    <img src="${item.image}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/200'">
                    <h3>${item.title} (${item.id})</h3>
                    <p class="price">₹${item.price}</p>
                    <a href="${item.link}" target="_blank" class="buy-btn">View on Amazon</a>
                </div>
            `).join('');
        }

        Papa.parse(sheetURL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allAccessories = results.data;
                displayAccessories(allAccessories);

                // Search Event Listener
                const searchInput = document.getElementById('productSearch');
                searchInput.addEventListener('input', (e) => {
                    const searchTerm = e.target.value.toLowerCase();
                    const filtered = allAccessories.filter(item => 
                        item.title.toLowerCase().includes(searchTerm) || 
                        item.id.toLowerCase().includes(searchTerm)
                    );
                    displayAccessories(filtered);
                });
            }
        });
    </script>
</body>
</html>
