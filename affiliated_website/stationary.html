<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stationary Collection | Afflatus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">

    <!-- Navigation (Update links as needed) -->
    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">Afflatus Inventory</h1>
            <div class="space-x-6">
                <a href="index.html" class="text-gray-600 hover:text-blue-600">Home</a>
                <a href="electronics.html" class="text-gray-600 hover:text-blue-600">Electronics</a>
                <a href="stationary.html" class="text-blue-600 font-semibold border-b-2 border-blue-600">Stationary</a>
            </div>
        </div>
    </nav>

    <!-- Header Section -->
    <header class="bg-blue-600 py-12 text-center text-white">
        <h2 class="text-4xl font-bold">Stationary & Office Supplies</h2>
        <p class="mt-2 text-blue-100">Browse our latest collection of premium stationary</p>
    </header>

    <!-- Product Grid -->
    <main class="container mx-auto py-10 px-4">
        <div id="stationary-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Loading State -->
            <div class="col-span-full text-center py-20">
                <p class="text-gray-500 animate-pulse text-lg">Loading inventory items...</p>
            </div>
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vROgG5rCiBGxWhLS-sen2CvY-OCXpDQ_12H3QGkYFBSaXD03LoQ65MJGTjrh2cR8INAGQbEDI4OaDI2/pub?gid=1881892522&single=true&output=csv';

        async function fetchStationary() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // Skip header row
                const grid = document.getElementById('stationary-grid');
                grid.innerHTML = ''; // Clear loading state

                rows.forEach(row => {
                    const columns = row.split(',');
                    // Mapping columns: 0:ID, 1:Category, 2:Title, 3:Price, 4:Image, 5:Link, 6:Brand
                    if (columns.length >= 6) {
                        const [id, category, title, price, image, link, brand] = columns;
                        
                        grid.innerHTML += `
                            <div class="bg-white rounded-xl shadow-sm hover:shadow-lg transition-shadow border border-gray-100 overflow-hidden">
                                <div class="h-48 overflow-hidden bg-gray-200">
                                    <img src="${image.trim()}" alt="${title}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                                </div>
                                <div class="p-5">
                                    <span class="text-xs font-bold text-blue-500 uppercase tracking-widest">${brand}</span>
                                    <h3 class="text-lg font-bold mt-1 text-gray-800">${title}</h3>
                                    <p class="text-gray-500 text-sm mt-1">ID: ${id}</p>
                                    <div class="flex items-center justify-between mt-4">
                                        <span class="text-xl font-bold text-gray-900">₹${price}</span>
                                        <a href="${link.trim()}" target="_blank" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm transition-colors">
                                            View Product
                                        </a>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('stationary-grid').innerHTML = '<p class="col-span-full text-center text-red-500">Failed to load stationary inventory. Please check data source.</p>';
            }
        }

        fetchStationary();
    </script>
</body>
</html>
