<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Contact | VIP GAMING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen">
    <div class="bg-slate-900 p-10 rounded-[2rem] border border-cyan-500/20 w-full max-w-md shadow-2xl">
        <h2 class="text-3xl font-black mb-8 text-cyan-500 italic uppercase text-center" style="font-family: 'Orbitron';">Contact Us</h2>
        <form>
            <input type="text" placeholder="Name" class="w-full bg-slate-800 p-5 rounded-2xl mb-4 text-white focus:ring-2 focus:ring-cyan-500 outline-none">
            <textarea placeholder="Message" class="w-full bg-slate-800 p-5 rounded-2xl mb-6 h-32 text-white focus:ring-2 focus:ring-cyan-500 outline-none"></textarea>
            <button class="w-full bg-cyan-600 py-4 rounded-2xl font-black text-xl hover:bg-cyan-500 transition uppercase shadow-lg shadow-cyan-900/30">Send Message</button>
        </form>
        <div class="mt-6 text-center"><a href="index.html" class="text-slate-500 hover:text-white transition underline underline-offset-4">← Back to Home</a></div>
    </div>
</body>
</html>
