<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afflatus Assistant</title>
    <style>
        :root { --primary: #2563eb; --bot-msg: #f1f5f9; --user-msg: #2563eb; }
        
        /* Layout Fix: Fills the entire popup window */
        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; font-family: 'Inter', sans-serif; 
        }
        
        #chat-container { 
            display: flex; flex-direction: column; 
            height: 100vh; width: 100vw; background: white; 
        }
        
        #chat-header { 
            background: var(--primary); color: white; padding: 16px; 
            display: flex; align-items: center; gap: 10px; font-weight: 600; flex-shrink: 0; 
        }
        
        #chat-messages { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; 
            flex-direction: column; gap: 12px; background-color: #f8fafc; 
        }
        
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 80%; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .user { background: var(--user-msg); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: var(--bot-msg); color: #1e293b; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #e2e8f0; }
        
        #input-area { 
            padding: 15px; border-top: 1px solid #e2e8f0; 
            display: flex; gap: 10px; background: white; flex-shrink: 0; 
        }
        
        input { flex: 1; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; outline: none; font-size: 14px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        
        .typing { font-style: italic; color: #64748b; font-size: 12px; display: none; padding: 5px 20px; background: #f8fafc; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">
        <div style="width: 10px; height: 10px; background: #4ade80; border-radius: 50%;"></div>
        Afflatus Assistant
    </div>
    <div id="chat-messages"></div>
    <div id="typing-indicator" class="typing">Thinking...</div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask about products or prices...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script type="module">
    // --- YOUR SETTINGS ---
    // Please verify this key in Google AI Studio. If it's missing characters, the bot will show an error.
    const API_KEY = "AIzaSyCfxHFGZO2jBI8Ur3tf8cXPkPJ9MEgZLuc"; 
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7qQWOeRWwpBCDp65s17U7vPN0S-MGQwD8Ja63AQYbcs7GxDFmWa2QbU4UWwv1GDkgAVrdHkRZkuh-/pub?output=csv";

    const messagesDiv = document.getElementById('chat-messages');
    const inputField = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');
    
    let inventoryData = "";

    // Load Google Sheets Data
    async function initBot() {
        try {
            const res = await fetch(SHEET_URL);
            inventoryData = await res.text();
            appendMessage('bot', "Namaste! I'm your Afflatus Assistant. How can I help you today?");
        } catch (e) {
            appendMessage('bot', "System: Catalog loaded with limited details. How can I help?");
        }
    }

    async function getAIResponse(userText) {
        typingIndicator.style.display = "block";

        // Super-stable prompt format for Gemini 1.5 Flash
        const payload = {
            contents: [{
                parts: [{ 
                    text: `Store Data: ${inventoryData}\n\nCustomer Question: ${userText}\n\nInstructions: Answer from data. If not found, tell them to WhatsApp +919610147688. Be brief.` 
                }]
            }]
        };

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            typingIndicator.style.display = "none";

            // Detailed Error Reporting
            if (data.error) {
                console.error("Gemini Error:", data.error);
                return "API ERROR: " + data.error.message;
            }

            if (data.candidates && data.candidates[0].content) {
                return data.candidates[0].content.parts[0].text;
            } else {
                return "I'm sorry, I couldn't find an answer for that. Please message us on WhatsApp.";
            }
        } catch (e) {
            typingIndicator.style.display = "none";
            return "Connection Error: " + e.message;
        }
    }

    async function handleChat() {
        const text = inputField.value.trim();
        if(!text) return;

        appendMessage('user', text);
        inputField.value = "";

        const botResponse = await getAIResponse(text);
        appendMessage('bot', botResponse);
    }

    function appendMessage(role, text) {
        const msg = document.createElement('div');
        msg.className = `msg ${role}`;
        msg.innerText = text;
        messagesDiv.appendChild(msg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    sendBtn.onclick = handleChat;
    inputField.onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };

    initBot();
</script>

</body>
</html>
