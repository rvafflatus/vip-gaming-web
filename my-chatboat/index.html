<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afflatus Assistant</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8fafc; }
        
        /* Force remove margins and fill container perfectly */
        html, body { 
            margin: 0 !important; 
            padding: 0 !important; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            font-family: 'Inter', -apple-system, sans-serif; 
        }
        
        #chat-container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100vw; 
            background: white; 
        }
        
        #chat-header { 
            background: var(--primary); 
            color: white; 
            padding: 15px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            flex-shrink: 0;
        }

        .status-dot { width: 10px; height: 10px; background: #4ade80; border-radius: 50%; }
        
        #chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            background-color: var(--bg);
        }
        
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #e8eaed; color: #202124; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #dadce0; }
        
        #input-area { 
            padding: 12px; 
            border-top: 1px solid #dadce0; 
            display: flex; 
            gap: 8px; 
            background: white; 
            flex-shrink: 0; 
        }
        
        input { flex: 1; border: 1px solid #dadce0; padding: 10px; border-radius: 6px; outline: none; font-size: 14px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        #loader { font-style: italic; color: #70757a; font-size: 12px; display: none; padding: 5px 15px; background: var(--bg); }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">
        <div class="status-dot"></div>
        Afflatus AI Assistant
    </div>
    <div id="chat-messages"></div>
    <div id="loader">Assistant is thinking...</div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your question...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script type="module">
    // --- SETTINGS ---
    const API_KEY = "AIzaSyA414iCGmDarBL5jE7F8V9gehlTHUkeQDk"; 
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7qQWOeRWwpBCDp65s17U7vPN0S-MGQwD8Ja63AQYbcs7GxDFmWa2QbU4UWwv1GDkgAVrdHkRZkuh-/pub?output=csv";

    const msgBox = document.getElementById('chat-messages');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const loader = document.getElementById('loader');
    
    let catalog = "";

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        msgBox.appendChild(div);
        msgBox.scrollTop = msgBox.scrollHeight;
    }

    // Initialize Catalog from Google Sheet
    async function start() {
        try {
            const res = await fetch(SHEET_URL);
            catalog = await res.text();
            addMessage('bot', "Namaste! I am the Afflatus AI. Ask me about our courses, gaming hub, or product prices.");
        } catch (e) {
            addMessage('bot', "Hello! How can I help you today?");
        }
    }

    async function getResponse(query) {
        loader.style.display = "block";
        
        // Updated payload and URL to use stable v1 endpoint
        const endpoint = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`;
        
        const body = {
            contents: [{ parts: [{ text: `You are the AI for vipgaming.in. Context: ${catalog}. Question: ${query}` }] }]
        };

        try {
            const response = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            const data = await response.json();
            loader.style.display = "none";

            if (data.error) {
                return "Technical Error: " + data.error.message;
            }

            if (data.candidates && data.candidates[0].content) {
                return data.candidates[0].content.parts[0].text;
            }
            
            return "I'm sorry, I couldn't process that. Please contact support on WhatsApp.";
        } catch (e) {
            loader.style.display = "none";
            return "Connection error. Please try again or WhatsApp us at +919610147688.";
        }
    }

    async function handleChat() {
        const text = input.value.trim();
        if(!text) return;

        addMessage('user', text);
        input.value = "";

        const botReply = await getResponse(text);
        addMessage('bot', botReply);
    }

    sendBtn.onclick = handleChat;
    input.onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };

    start();
</script>

</body>
</html>
