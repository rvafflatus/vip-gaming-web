<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afflatus Assistant</title>
    <style>
        :root { --primary: #2563eb; --bot-msg: #f1f5f9; --user-msg: #2563eb; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #f8fafc; }
        
        #chat-container { position: fixed; bottom: 20px; right: 20px; width: 380px; height: 550px; 
                          background: white; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
                          display: flex; flex-direction: column; border: 1px solid #e2e8f0; z-index: 9999; }
        
        #chat-header { background: var(--primary); color: white; padding: 16px; border-radius: 16px 16px 0 0; 
                          display: flex; align-items: center; gap: 10px; font-weight: 600; }
        
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 80%; font-size: 14px; line-height: 1.5; position: relative; }
        .user { background: var(--user-msg); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: var(--bot-msg); color: #1e293b; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        #input-area { padding: 15px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; background: white; border-radius: 0 0 16px 16px; }
        input { flex: 1; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        
        /* Typing effect */
        .typing { font-style: italic; color: #64748b; font-size: 12px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">
        <div style="width: 10px; height: 10px; background: #4ade80; border-radius: 50%;"></div>
        Afflatus Assistant
    </div>
    <div id="chat-messages"></div>
    <div id="typing-indicator" class="typing" style="padding-left: 20px;">Assistant is thinking...</div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask about products or prices...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script type="module">
    const API_KEY = "AIzaSyCfxHFGZO2jBI8Ur3tf8cXPkPJ9MEgZLuc"; 
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7qQWOeRWwpBCDp65s17U7vPN0S-MGQwD8Ja63AQYbcs7GxDFmWa2QbU4UWwv1GDkgAVrdHkRZkuh-/pub?output=csv";

    const messagesDiv = document.getElementById('chat-messages');
    const inputField = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');
    
    let inventoryData = "";

    async function initBot() {
        try {
            const res = await fetch(SHEET_URL);
            inventoryData = await res.text();
            appendMessage('bot', "Namaste! I'm your Afflatus Assistant. How can I help you today?");
        } catch (e) {
            appendMessage('bot', "System Error: Unable to fetch inventory data.");
        }
    }

    async function getAIResponse(userText) {
        typingIndicator.style.display = "block";
        const prompt = `You are the official AI for Afflatus (vipgaming.in). 
        You have access to the following inventory data in CSV format:
        ${inventoryData}

        INSTRUCTIONS:
        - If the user asks for a product, check the data and give the Price, Category, and any details found.
        - If the user asks about delivery or policies, answer based on the data.
        - If the data doesn't have the answer, politely ask them to contact support on WhatsApp.
        - Keep answers friendly and under 50 words.
        - Do not mention the CSV or technical details to the user.

        USER QUESTION: ${userText}`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const json = await response.json();
            typingIndicator.style.display = "none";
            return json.candidates[0].content.parts[0].text;
        } catch (e) {
            typingIndicator.style.display = "none";
            return "I'm having trouble connecting. Please try again or message us on WhatsApp.";
        }
    }

    async function handleChat() {
        const text = inputField.value.trim();
        if(!text) return;

        appendMessage('user', text);
        inputField.value = "";

        const botResponse = await getAIResponse(text);
        appendMessage('bot', botResponse);
    }

    function appendMessage(role, text) {
        const msg = document.createElement('div');
        msg.className = `msg ${role}`;
        msg.innerText = text;
        messagesDiv.appendChild(msg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    sendBtn.onclick = handleChat;
    inputField.onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };

    initBot();
</script>

</body>
</html>
