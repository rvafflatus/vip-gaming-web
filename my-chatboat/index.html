<script type="module">
    const API_KEY = "AIzaSyCfxHFGZO2jBI8Ur3tf8cXPkPJ9MEgZLuc"; // DOUBLE CHECK THIS
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7qQWOeRWwpBCDp65s17U7vPN0S-MGQwD8Ja63AQYbcs7GxDFmWa2QbU4UWwv1GDkgAVrdHkRZkuh-/pub?output=csv";

    const messagesDiv = document.getElementById('chat-messages');
    const inputField = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');

    // Simple message adder
    function addMsg(role, text) {
        const m = document.createElement('div');
        m.className = `msg ${role}`;
        m.innerText = text;
        messagesDiv.appendChild(m);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Load data
    let inventory = "";
    fetch(SHEET_URL).then(r => r.text()).then(t => {
        inventory = t;
        addMsg('bot', "Ready! Ask me anything about our products.");
    });

    async function chat() {
        const val = inputField.value.trim();
        if(!val) return;
        addMsg('user', val);
        inputField.value = "";
        typingIndicator.style.display = "block";

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            const res = await fetch(url, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Data: " + inventory + "\nUser: " + val }] }]
                })
            });
            
            const data = await res.json();
            typingIndicator.style.display = "none";

            if(data.error) {
                addMsg('bot', "API Error: " + data.error.message);
            } else {
                addMsg('bot', data.candidates[0].content.parts[0].text);
            }
        } catch (e) {
            typingIndicator.style.display = "none";
            addMsg('bot', "Error: " + e.message);
        }
    }

    sendBtn.onclick = chat;
    inputField.onkeypress = (e) => { if(e.key === 'Enter') chat(); };
</script>
